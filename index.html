<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Steam Machine Guesser</title>
    <style>
        body {
            background-color: #1a222d;
            color: #ffffff;
            font-family: 'Motiva Sans', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 15px;
            box-sizing: border-box;
        }

        #steam-container {
            background-color: #171a21;
            border: 2px solid #3a424a;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            box-sizing: border-box;
        }

        #steam-header h2 {
            color: #66c0f4;
            font-size: 24px;
            margin-top: 0;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #8f98a0;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .wheels-frame {
            display: flex;
            justify-content: center;
            margin-bottom: 25px;
            min-height: 340px; 
        }

        .wheel-wrapper {
            position: relative;
            background-color: #101216;
            border: 1px solid #2a313a;
            border-radius: 6px;
            padding: 15px;
            width: 300px;
            height: 300px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }

        .hidden {
            display: none !important;
        }

        .pointer {
            color: #66c0f4;
            font-size: 24px;
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        canvas {
            display: block;
            width: 260px;
            height: 260px;
        }

        .wheel-label {
            color: #4f5860;
            font-weight: bold;
            font-size: 14px;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        #spin-button {
            background: linear-gradient( to right, #47b230 0%, #5cba38 100%);
            border: none;
            border-radius: 4px;
            color: #ffffff;
            font-size: 22px;
            font-weight: bold;
            padding: 16px 0;
            width: 100%;
            max-width: 300px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        #spin-button:hover {
            background: linear-gradient( to right, #51ca37 0%, #68d341 100%);
        }
        
        #spin-button:disabled {
            background: #3a424a;
            color: #8f98a0;
            cursor: not-allowed;
            box-shadow: none;
        }

        #display-container {
            background-color: #101216;
            border: 1px solid #2a313a;
            border-radius: 4px;
            margin-top: 25px;
            padding: 20px;
        }

        #status-label {
            color: #a3a4a5;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        #date-result {
            color: #66c0f4;
            font-size: 20px;
            font-weight: bold;
        }

        @media (max-width: 400px) {
            .wheel-wrapper {
                width: 260px;
                height: 260px;
            }
            canvas {
                width: 220px;
                height: 220px;
            }
            .wheels-frame {
                min-height: 290px;
            }
        }
    </style>
</head>
<body>

    <div id="steam-container">
        <div id="steam-header">
            <h2>STEAM MACHINE GUESSER</h2>
            <div class="subtitle">When will you get yours?</div>
        </div>

        <div class="wheels-frame">
            <div id="month-wrapper" class="wheel-wrapper">
                <div class="pointer">▼</div>
                <canvas id="month-wheel" width="600" height="600"></canvas>
                <div class="wheel-label">MONTH</div>
            </div>

            <div id="day-wrapper" class="wheel-wrapper hidden">
                <div class="pointer">▼</div>
                <canvas id="day-wheel" width="600" height="600"></canvas>
                <div class="wheel-label">DAY</div>
            </div>
        </div>

        <button id="spin-button">SPIN</button>

        <div id="display-container">
            <div id="status-label">SYSTEM STATUS: IDLE</div>
            <div id="date-result">AWAITING SEQUENCE INITIATION</div>
        </div>
    </div>

    <script>
        // Data arrays for the wheels
        const months = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];
        const days = Array.from({length: 31}, (_, i) => (i + 1).toString());

        // Wheel State
        let monthAngle = 0;
        let dayAngle = 0;
        let monthVelocity = 0;
        let dayVelocity = 0;
        let isSpinningMonth = false;
        let isSpinningDay = false;
        let selectedMonth = "";
        let selectedDay = "";

        // Canvas Setup
        const monthCanvas = document.getElementById('month-wheel');
        const dayCanvas = document.getElementById('day-wheel');
        const monthCtx = monthCanvas.getContext('2d');
        const dayCtx = dayCanvas.getContext('2d');

        // Steam-themed slice colors
        const colors = ["#2a475e", "#1b2838"];

        // Renders the wheel on the canvas
        function drawWheel(ctx, items, angleOffset) {
            const width = ctx.canvas.width;
            const height = ctx.canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;
            const radius = width / 2;
            const arc = 2 * Math.PI / items.length;

            ctx.clearRect(0, 0, width, height);

            for (let i = 0; i < items.length; i++) {
                const angle = angleOffset + i * arc;
                
                // Draw slice
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, angle, angle + arc, false);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.strokeStyle = "#101216"; // Divider color
                ctx.lineWidth = 4;
                ctx.stroke();

                // Draw text
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.textBaseline = "middle";
                ctx.fillStyle = "#c7d5e0";
                
                // Scale font size based on slice count
                const fontSize = items.length > 12 ? 24 : 34;
                ctx.font = `bold ${fontSize}px 'Motiva Sans', Arial, sans-serif`;
                
                ctx.fillText(items[i], radius - 25, 0);
                ctx.restore();
            }
        }

        // Calculates which slice is pointing to the top triangle
        function getResult(items, angleOffset) {
            const arc = 2 * Math.PI / items.length;
            
            // Normalize angle to 0 - 2PI
            let normalizedAngle = angleOffset % (2 * Math.PI);
            if (normalizedAngle < 0) normalizedAngle += 2 * Math.PI;

            // Pointer is at the top (270 degrees or 1.5 * PI)
            let topAngle = (1.5 * Math.PI - normalizedAngle) % (2 * Math.PI);
            if (topAngle < 0) topAngle += 2 * Math.PI;

            const index = Math.floor(topAngle / arc);
            return items[index];
        }

        // Animation Loop
        function animate() {
            if (isSpinningMonth) {
                monthAngle += monthVelocity;
                monthVelocity *= 0.985; // Friction
                
                if (monthVelocity < 0.002) {
                    isSpinningMonth = false;
                    monthVelocity = 0;
                    selectedMonth = getResult(months, monthAngle);
                    
                    document.getElementById('status-label').innerText = "SYSTEM STATUS: MONTH SECURED";
                    document.getElementById('date-result').innerText = selectedMonth + " ...";
                    
                    // Pause briefly, then transition to day wheel
                    setTimeout(() => {
                        document.getElementById('month-wrapper').classList.add('hidden');
                        document.getElementById('day-wrapper').classList.remove('hidden');
                        document.getElementById('status-label').innerText = "SYSTEM STATUS: CALCULATING DAY...";
                        isSpinningDay = true;
                        dayVelocity = Math.random() * 0.2 + 0.4; 
                        requestAnimationFrame(animate);
                    }, 1200);
                }
                drawWheel(monthCtx, months, monthAngle);
            } 
            else if (isSpinningDay) {
                dayAngle += dayVelocity;
                dayVelocity *= 0.985;
                
                if (dayVelocity < 0.002) {
                    isSpinningDay = false;
                    dayVelocity = 0;
                    selectedDay = getResult(days, dayAngle);
                    
                    document.getElementById('status-label').innerText = "SYSTEM STATUS: ESTIMATION COMPLETE";
                    document.getElementById('date-result').innerText = selectedMonth + " " + selectedDay;
                    
                    const btn = document.getElementById('spin-button');
                    btn.disabled = false;
                    btn.innerText = "SPIN AGAIN";
                }
                drawWheel(dayCtx, days, dayAngle);
            }
            
            if (isSpinningMonth || isSpinningDay) {
                requestAnimationFrame(animate);
            }
        }

        // Draw initial static state
        drawWheel(monthCtx, months, monthAngle);
        drawWheel(dayCtx, days, dayAngle);

        // Click Handler
        document.getElementById('spin-button').addEventListener('click', function() {
            if (isSpinningMonth || isSpinningDay) return;
            
            // Reset UI for a new spin
            this.disabled = true;
            this.innerText = "CALCULATING...";
            
            document.getElementById('day-wrapper').classList.add('hidden');
            document.getElementById('month-wrapper').classList.remove('hidden');
            
            document.getElementById('status-label').innerText = "SYSTEM STATUS: CALCULATING MONTH...";
            document.getElementById('date-result').innerText = "AWAITING SEQUENCE INITIATION";
            
            // Give it a random initial speed
            isSpinningMonth = true;
            monthVelocity = Math.random() * 0.2 + 0.4; 
            
            animate();
        });
    </script>
</body>
</html>
