<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam Machine Guesser</title>
    <style>
        body {
            background-color: #1a222d;
            color: #ffffff;
            font-family: 'Motiva Sans', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        #steam-container {
            background-color: #171a21;
            border: 2px solid #3a424a;
            border-radius: 8px;
            padding: 30px;
            width: 680px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
        }

        #steam-header h2 {
            color: #66c0f4;
            font-size: 28px;
            margin-bottom: 5px;
            letter-spacing: 2px;
        }

        .subtitle {
            color: #8f98a0;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .wheels-frame {
            display: flex;
            justify-content: space-around;
            gap: 20px;
            margin-bottom: 30px;
        }

        .wheel-wrapper {
            position: relative;
            background-color: #101216;
            border: 1px solid #2a313a;
            border-radius: 6px;
            padding: 15px;
        }

        .pointer {
            color: #66c0f4;
            font-size: 24px;
            position: absolute;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
        }

        canvas {
            display: block;
            max-width: 100%;
        }

        .wheel-label {
            color: #4f5860;
            font-weight: bold;
            font-size: 14px;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        #spin-button {
            background: linear-gradient( to right, #47b230 0%, #5cba38 100%);
            border: none;
            border-radius: 3px;
            color: #ffffff;
            font-size: 20px;
            font-weight: bold;
            padding: 15px 60px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: background 0.2s;
        }

        #spin-button:hover {
            background: linear-gradient( to right, #51ca37 0%, #68d341 100%);
        }

        #display-container {
            background-color: #101216;
            border: 1px solid #2a313a;
            border-radius: 4px;
            margin-top: 30px;
            padding: 20px;
        }

        #status-label {
            color: #a3a4a5;
            font-size: 12px;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        #date-result {
            color: #66c0f4;
            font-size: 22px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="steam-container">
        <div id="steam-header">
            <h2>STEAM MACHINE GUESSER</h2>
            <div class="subtitle">When will you get yours?</div>
        </div>

        <div class="wheels-frame">
            <div class="wheel-wrapper">
                <div class="pointer">▼</div>
                <canvas id="month-wheel" width="300" height="300"></canvas>
                <div class="wheel-label">MONTH</div>
            </div>

            <div class="wheel-wrapper">
                <div class="pointer">▼</div>
                <canvas id="day-wheel" width="300" height="300"></canvas>
                <div class="wheel-label">DAY</div>
            </div>
        </div>

        <button id="spin-button">SPIN</button>

        <div id="display-container">
            <div id="status-label">SYSTEM STATUS: IDLE</div>
            <div id="date-result">AWAITING SEQUENCE INITIATION</div>
        </div>
    </div>

    <script src="js.js"></script>
</body>
</html>
